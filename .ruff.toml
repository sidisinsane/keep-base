target-version = "py312"
line-length = 80
indent-width = 4
respect-gitignore = true
output-format = "json"

[lint]
select = [
  "ANN", # type annotation enforcement
  "D", # pydocstyle
  "E",
  "F", # pyflakes
  "I", # isort
  "N", # pep8-naming
  "S", # bandit (security)
  "W", # pycodestyle
]
per-file-ignores."**/test_*.py" = ["D", "S101"]
per-file-ignores."src/keep/**/__init__.py" = ["D104"]
per-file-ignores."tests/*" = ["D", "S101"]
isort.case-sensitive = true
isort.length-sort-straight = true
isort.lines-after-imports = 2
isort.lines-between-types = 1
isort.order-by-type = true
isort.required-imports = ["from __future__ import annotations"]
pydocstyle.convention = "google"

[format]
quote-style = "double"
docstring-code-line-length = "dynamic"
docstring-code-format = true
